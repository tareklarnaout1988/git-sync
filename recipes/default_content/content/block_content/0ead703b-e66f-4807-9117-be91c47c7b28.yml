      value: '<p class="text-align-justify">The industrialisation dimension assesses service delivery performance and progress in government’s efforts to provide the supportive business environment, including access to quality infrastructure, particularly industrial parks with access to requisite infrastructures and technology to support innovation and manufacturing value addition. The two dimensions: Infrastructure (industrial parks) development and enabling business environment includes indicators assesses levels of investment (domestic and foreign), manufacturing value added, and ease of starting a business and accessing finance for small and medium-sized enterprises.</p>'
