    body:
      -
        value: '<p>Les dimensions énergie et électricité évaluent la performance et les progrès en matière de fourniture de services afin de garantir que l’accès à l’électricité et aux énergies renouvelables constitue des services durables pour les citoyens, tout en protégeant l’environnement. Les quatre sous-dimensions incluses offrent une évaluation complète de la performance du secteur et des écarts existants en matière d’accès et d’utilisation de l’électricité à grande échelle, de production d’électricité, de changement climatique et de croissance verte, ainsi que du cadre réglementaire de l’électricité. La sous-dimension accès et utilisation de l’électricité reflète la performance à travers sept indicateurs : l’accès aux combustibles et technologies propres pour la cuisson (% de la population) ; la consommation finale d’électricité par habitant (kWh) ; l’accès de la population à l’électricité – national (% de la population) ; l’accès de la population à l’électricité – rural (% de la population) ; l’accès de la population à l’électricité – urbain (% de la population) ; la consommation d’énergie renouvelable (% de la consommation finale totale d’énergie) ; et le niveau d’intensité énergétique de l’énergie primaire (mégajoules par unité de PIB en parité de pouvoir d’achat constant de 2017). La sous-dimension production d’électricité reflète la performance des pays à travers quatre indicateurs : l’augmentation de la production d’électricité renouvelable hors réseau ; l’augmentation de la production d’électricité renouvelable raccordée au réseau ; la part de la production d’électricité renouvelable dans la production totale d’électricité ; et la production totale d’électricité (kWh par habitant). Le cadre réglementaire de l’électricité reflète le cadre politique et la structure de gouvernance essentiels à la fiabilité de l’approvisionnement en électricité et à la durabilité du secteur électrique, et la sous-dimension changement climatique et croissance verte comprend huit indicateurs : les émissions de CO₂ (tonnes métriques par habitant) ; les pertes économiques directes attribuées aux catastrophes par rapport au PIB (%) ; les exportations de biens environnementaux en proportion des exportations totales (%) ; les terres forestières (% de la superficie terrestre) ; la pollution de l’air par les PM2,5, exposition annuelle moyenne (microgrammes par mètre cube) ; la production d’électricité à partir du solaire, de l’éolien, des marées, des vagues et d’autres sources (kWh par habitant) ; l’hydroélectricité (kWh par habitant) ; et les émissions totales de gaz à effet de serre (tonnes métriques d’équivalent CO₂ par habitant), reflétant la performance vers un développement durable tout en protégeant l’environnement, en assurant un accès à grande échelle à des sources d’électricité durables et abordables, et en préservant les ressources pour l’avenir grâce à la promotion de la croissance verte.</p>'
        format: basic_html
