  body:
    -
      value: '<p class="text-align-justify">The power and electricity dimensions assess service delivery performance and progress in ensuring that electricity and renewable energy access are sustainable services to citizens while protecting the environment. The four subdimensions included provide a comprehensive assessment of the sector performance and gaps in ensuring scaled electricity access and use, electricity generation, climate change and green growth, and the electricity regulatory framework. The electricity access and use subdimension reflect performance using seven indicators: access to clean fuels and technologies for cooking (% of the population); electricity final consumption per capita (kWh); population access to electricity—national (% of the population); population access to electricity—rural (% of the population); population access to electricity—urban (% of the population); renewable energy consumption (% of total final energy consumption); and energy intensity level of primary energy (megajoules per constant 2017 purchasing power parity GDP. The electricity generation subdimension reflects country performance on four indicators: the increase of off-grid renewable electricity generation; the increase of on-grid renewable electricity generation; the share of renewable electricity generation in total electricity generation; and the total electricity generation (kWh per capita). The electricity regulatory framework reflects the policy framework and governance structure crucial to the reliability of electricity supply and sustainability of the electricity sector, and the climate change and green growth subdimensions eight indicators: CO2 emissions (metric tons per capita); direct economic loss attributed to disasters relative to GDP (%); environmental goods exports as a share of total exports (%); forest land (% of land area); PM2.5 air pollution, mean annual exposure (micrograms per cubic meter); production of electricity from solar, wind, tide, wave, and other (kWh per capita); hydroelectricity (kWh per capita) and total greenhouse gas emissions (metric ton (mt) of CO2 equivalent per capita reflects performance towards sustainable development while protecting the environment by ensuring access to sustainable, affordable sources of electricity at scale and resources for the future by promoting green growth.</p>'
      format: full_html
      summary: ''
