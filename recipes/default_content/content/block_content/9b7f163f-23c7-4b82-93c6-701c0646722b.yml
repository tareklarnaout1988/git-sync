    body:
      -
        value: "<p class=\"text-align-justify\">La perception reflète l'expérience et le niveau de satisfaction des ménages quant à la qualité des services reçus, en fonction de leurs interactions avec les systèmes de prestation de services. Les ménages ont évalué les services selon des dimensions clés, notamment l'accessibilité, la fiabilité, la qualité, la fréquence et l'abordabilité, sur une échelle de 0 à 10, où 0 représente la pire des satisfactions (absence totale de service) et 10, la plus élevée. Les scores de perception ont été regroupés en trois catégories afin de mettre en évidence les niveaux de satisfaction (PSDI) auxquels se situent différentes proportions de pays. Un score de 70 et plus (7-10) indique une perception élevée, les ménages étant très satisfaits de la prestation de services ou de la qualité du service obtenu. Un score de 50 à 69 (5-6) indique une perception moyenne, les ménages étant modérément satisfaits de la qualité des services, sans être très enthousiastes, et souhaitant des améliorations. Un score de perception inférieur à 50 (0-4) indique une faible satisfaction quant à la prestation de services et à la qualité reçue, les ménages étant insatisfaits et souhaitant des améliorations significatives.</p>"
        format: full_html
        summary: ''
