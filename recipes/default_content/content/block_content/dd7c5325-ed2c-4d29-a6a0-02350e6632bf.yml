      value: '<p class="text-align-justify">The Socioeconomic inclusion dimension assesses service support that ensures that education, skills development, health and healthcare, water and sanitation, digital technology, employability, mobility, inclusion and fairness, and safety are provided seamlessly to citizens for improving their well-being. The dimension comprises five subdimensions: youth and employment and training; poverty and inequality; gender and women empowerment; health; and water and sanitation, each with a subset of underlying indicators.</p>'
