<td style="background-color:#f5dfcf;">Internet users (% of the population)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">PIN4</td><td style="background-color:#f5dfcf;">Mobile cellular subscriptions (per 100 people)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">PIN5</td><td style="background-color:#f5dfcf;">Population covered by at least a 3G mobile network (%)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">PIN6</td><td style="background-color:#f5dfcf;">Urban population living in slums (%)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">PIN7</td><td style="background-color:#f5dfcf;">Unemployment rate, 15+ years (%)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;" rowspan="6">Gender and women empowerment</td><td style="background-color:#f5dfcf;" rowspan="6">20.89</td><td style="background-color:#f5dfcf;">GWE1</td><td style="background-color:#f5dfcf;">CPIA Gender Equality (1 = low to 6 = high)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">GWE2</td><td style="background-color:#f5dfcf;">CPIA Social Protection and Labor (1 = low to 6 = high)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">GWE3</td><td style="background-color:#f5dfcf;">Seats held by women in national parliaments (%)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">GWE4</td><td style="background-color:#f5dfcf;">Female youth NEET (%)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">GWE5</td><td style="background-color:#f5dfcf;">Female youth unemployment rate (15–24)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">GWE6</td><td style="background-color:#f5dfcf;">Women Business and the Law Index Score (scale 1–100)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;" rowspan="10">Health</td><td style="background-color:#f5dfcf;" rowspan="10">19.10</td><td style="background-color:#f5dfcf;">HET1</td><td style="background-color:#f5dfcf;">Current health expenditure per capita (current US$)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">HET2</td><td style="background-color:#f5dfcf;">DALYs due to ambient ozone pollution (rate per 100,000 persons)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">HET3</td><td style="background-color:#f5dfcf;">DALYs due to ambient particulate matter pollution (PM<sub>2.5</sub>)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">HET4</td><td style="background-color:#f5dfcf;">DALYs household air pollution</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">HET5</td><td style="background-color:#f5dfcf;">Healthcare access quality index (score 0–100)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">HET6</td><td style="background-color:#f5dfcf;">Life expectancy at birth, total (years)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">HET7</td><td style="background-color:#f5dfcf;">Maternal mortality ratios (per 100,000 live births)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">HET8</td><td style="background-color:#f5dfcf;">Medical doctors (per 10,000 people)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">HET9</td><td style="background-color:#f5dfcf;">Out-of-pocket expenditure (% of current health expenditure)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">HET10</td><td style="background-color:#f5dfcf;">Under-five mortality rate (per 1,000 live births)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;" rowspan="6">Water and sanitation</td><td style="background-color:#f5dfcf;" rowspan="6">20.44</td><td style="background-color:#f5dfcf;">WSA1</td><td style="background-color:#f5dfcf;">DALYs unsafe water source (per 100,000 persons)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">WSA2</td><td style="background-color:#f5dfcf;">DALYs unsafe sanitation (per 100,000 persons)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">WSA3</td><td style="background-color:#f5dfcf;">People using at least basic drinking water services (% of population)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">WSA4</td><td style="background-color:#f5dfcf;">People using improved drinking water services, rural (% of rural)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">WSA5</td><td style="background-color:#f5dfcf;">People using improved basic sanitation services (% of population)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;">WSA6</td><td style="background-color:#f5dfcf;">Improved basic sanitation services in rural (%)</td></tr></tbody><!-- Power and electricity --><!-- Food sovereignty --><!-- Regional integration --><!-- Industrialization --><!-- Socioeconomic inclusion --></table><p class="text-align-justify">available on the number of households connected to the electricity network, the number was weighed against the total number of households, providing a percentage of the population connected to the electricity grid network. Similarly, the indicator of total agricultural exports was scaled using total trade volume to obtain the share of agricultural exports to total exports in the country. Where data was provided as percentages of people with access to water, such data did not require any scaling but needed to be normalized to unitless scores for inclusion in the index. Also, indicators or variables provided as ratios or rates (e.g., the number of medical doctors per 10,000 patients or transport- related deaths per population), or trend based indicators that capture percentage growth rates adjusted for economic impacts (i.e., rate of change in total CO2 emissions), and data on health risks (i.e., disability- adjusted life years (DALYs) due to unsafe water, sanitation, and pollution provided at rates per 100,000 people) do not require further scoring except adjusting for skewness (or extreme value analysis) and final normalization (table A1.1)</p><p class="text-align-justify"><strong>Extreme values analysis</strong><br>To identify extreme values and outliers, descriptive and distributional analyses of each data indicator were provided. For true outliers, value greater than the 99th percentile was partially trimmed or low ered to match the 99th percentile value. Similarly, outlying value lower than one percentile was set at the 1st percentile value. This was done on a case by-case basis to ensure the non- exclusion of true values that are simply high and describe an actual situation in a country</p><p class="text-align-justify"><strong>Missing data and imputation</strong><br>Missing values in the panel data were imputed only from the closest recent previous years to ensure the use of the most correct reported data. A forward carryover method was applied where subsequent years were missing. For example, after observing the indicator data trend, the miss ing data for indicator “Id1” in 2022 was imputed with 2021 using a forward carryover method, while the backward carryover method was used for Id3. Interpolation was also tested when values were missing between the years. An example is Id1 for years 2013, 2014, 2017, and 2018. When there was a lack of time series data to observe the trend, and only two data points were avail able, the means of the closest years were used. In some countries, either the last existing value was used, or a multiple imputation chained equations or mass imputation method was applied using data from other countries. This was done for three countries and only for three critical variables for analysis (table A1.2)</p><p class="text-align-justify"><strong>Data transformation</strong><br>Data transformation was performed for indicators with negatively skewed distribution to reduce the</p><table class="table" style="border-collapse:collapse;font-family:Arial,sans-serif;font-size:14px;width:100%;" cellpadding="6" cellspacing="0"><thead><tr style="border-bottom:2px solid #bdbdbd;"><th style="background-color:#ffffff;font-weight:700;padding:6px 10px;text-align:left;">&nbsp;</th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>..</strong></th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>2010</strong></th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>2011</strong></th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>2012</strong></th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>2013</strong></th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>2014</strong></th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>2015</strong></th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>2016</strong></th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>2017</strong></th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>2018</strong></th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>2020</strong></th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>2021</strong></th><th style="background-color:#ffffff;padding:6px 10px;text-align:center;"><strong>2022</strong></th></tr></thead><tbody><tr style="border-bottom:1px solid #d8d8d8;"><td style="backgroun