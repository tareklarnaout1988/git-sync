      value: '<p class="text-align-justify"><strong>INDEX FRAMEWORK AND DIMENSIONS</strong></p><p class="text-align-justify">A key assumption about the role of public services is that they support threshold domains and social justice15 by creating a level playing field that enhances opportunities, capabilities, and choices for all. Countries have a role in securing citizens’ basic opportunities in life beyond the basic needs approach (or the basic minimum for survival). The role of policy is then to expand individuals’ capabilities and opportunities, not just regarding resources and utilities, but also in ensuring inclusiveness and equitable access to opportunities. Critical to adequate public sector performance is a clear understanding of the degree of progress towards achieving the goals of public service delivery and citizens’ perception of such progress. The construction of the Public Service Delivery Index (PSDI) for Africa by the African Devel opment Bank (AfDB) is aimed to guide governments and policymakers as they seek to improve their public service performance. The index highlights performance areas in each country that need targeted investments by development partners. The PSDI captures the governments’ capabilities across five dimensions (figure A1.1), emphasizing the strengthening of the population’s capabilities by increasing their access to resources necessary to achieve service effects</p><img src="/PSDI/web/sites/default/files/inline-images/Capture%20d%E2%80%99e%CC%81cran%202025-12-15%20a%CC%80%2015.10.48.png" data-align="center" data-entity-uuid="32d2416c-2db4-40c7-88b4-0a10bd7f7383" data-entity-type="file" alt="PSDI conceptual framework" width="479" height="307" data-caption="FIGURE A1.1 PSDI conceptual framework"><p class="text-align-justify">they value. For example, quality essential services and crucial infrastructure ensure that the working population possesses the human capabilities to be productively employed and take advantage of economic opportunities to create wealth. Figure A1.1 shows the conceptual framework used in developing the PSDI, which draws from two prime data sources.</p><p class="text-align-justify">The PSDI construction largely follows the pro cedures adapted from the Handbook on con structing composite indicators (OECD; European Commission JRC, 2008). The unequal weights for indicators and subdimensions are determined using principal component factor (PCF) analysis. PCF, one of the most commonly used multivariate statistical methods for creating a composite index, combines a set of variables to extract the max imum information common across these individ ual indicators. The indicators may or may not be correlated with other indicators. Weights based on PCF utilize the correlation structure of data and correct for overlapping information among correlated indicators. The PCF is particularly appropriate when each component measures dif ferent aspects of the public service delivery multi dimensional concept. The weights represent the variability for each indicator score in the total vari ability in the index or composite indicator score.</p><p class="text-align-justify">Before aggregation, the absolute indicators in the PSDI were scaled to relative measures based on a country’s development level, population, or land area, then transformed where necessary to deal with data skewness, and then normalized to unit less scores between 0 and 100 using a min- max method with fixed bounds. The normalized score 0 and 100 represent the lowest and the highest performers, respectively. The following section outlines data sources and indicators selection, time series, indicator scaling to relative measures, transformations, treatment of missingness, extreme values, normalization, weighting, and aggregation to dimension scores and the PSDI scores, and finally, the uncertainty analysis.</p><p class="text-align-justify"><strong>Data sources and selection of indicators</strong></p><p class="text-align-justify"><em>PSDI secondary data sources&nbsp;</em></p><p class="text-align-justify">To generate the indicator weights, the data series ranged from 2015 to the latest data available to ensure robustness. The index’s release year is two years ahead of the source data. In other words, this PSDI report, released in 2024, is based on data spanning 2015–22. The PSDI data were sourced mainly from the African Information Highway, the AfDB’s Statis tics department, the AfDB’s sector departments, nationally published data on existing public sector indicators, and other credible public data sources, including the World Bank, International Labour Organization (ILO), Institute of Health Metrics (IHME), and the Food and Agriculture Organization of the United Nations (FAO). Existing AfDB sector indexes, including the African Regional integra tion Index (ARII), Africa Industrialization Index (AII), Africa Infrastructure Development Index (AIDI), and the Visa Openness Index, provided service delivery indicators. The following criteria are used to define the indicators.</p><img src="/PSDI/web/sites/default/files/inline-images/Capture%20d%E2%80%99e%CC%81cran%202025-12-15%20a%CC%80%2015.32.41.png" data-align="center" data-entity-uuid="043689b0-e041-47d1-bc0e-5b7e31c62c28" data-entity-type="file" alt="Steps in developing the index" width="516" height="214" data-caption="FIGURE A1.2 Steps in developing the index"><p class="text-align-justify">&nbsp;</p><ul><li><p class="text-align-justify">Indicators aligned with aspects of impacts of public service delivery for achieving Africa’s development goals, including Agenda 2063, the Bank’s High 5s, and the Bank’s new Ten Year Strategy (TYS 2024–2033).</p></li><li><p class="text-align-justify">Indicators related to policy outcomes in areas where higher investment would yield better quality public services and public value regard ing government achievements, such as gaps in health and education, environmentally friendly goods and services, improved air quality, and infrastructure services.</p></li><li><p class="text-align-justify">Indicators that lack data for long periods were excluded.</p></li><li><p class="text-align-justify">Publicly available indicators from credible institutions.</p></li><li><p class="text-align-justify">Indicators with:</p><ul><li><p class="text-align-justify">Clarity of objective: Clear operational defini tion of what is measured in a standardized quantity or quality matrix, for example, kW/ hr/day of electricity.</p></li><li><p class="text-align-justify">Relevance and suitability of data to com posite PSDI: Clarity of weighting score in the composite PSDI.</p></li><li><p class="text-align-justify">Availability and coverage: It should be avail able for most of the 54 countries.</p></li><li><p class="text-align-justify">Measurability and comparability: Indicators should be related to things that can be mea sured unambiguously across countries.</p></li><li><p class="text-align-justify">Realism of data access: Collecting the information should be relatively easy and inexpensive.</p></li><li><p class="text-align-justify">Attribution: The measured changes should be attributable to the objective and expressed in precise terms.</p></li></ul></li></ul><p class="text-align-justify">&nbsp;</p><table class="table" style="border-collapse:collapse;border-color:#9aa3a7;font-family:Arial,sans-serif;font-size:14px;width:100%;" border="1" cellpadding="8" cellspacing="0"><thead><tr><th align="left">Dimension</th><th align="left">Subdimension</th><th align="left">Dimension weight (%)</th><th align="left">Subdimension weight (%)</th><th align="left">Indicator abbrev.</th><th align="left">Indicator name</th></tr></thead><tbody><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;" rowspan="20"><strong>Power and electricity</strong></td><td style="background-color:#d9ecec;" rowspan="7">Electricity access and use</td><td style="background-color:#d9ecec;" rowspan="20">20</td><td style="background-color:#d9ecec;" rowspan="7">27.90</td><td style="background-color:#d9ecec;">LEA1</td><td style="background-color:#d9ecec;">Access to clean fuels and technologies for cooking (% of population)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LEA2</td><td style="background-color:#d9ecec;">Access to electricity (% of population)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LEA3</td><td style="background-color:#d9ecec;">Energy intensity level of primary energy (megajoules per constant 2017 purchasing power parity GDP)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LEA4</td><td style="background-color:#d9ecec;">Final consumption of electricity per capita (kWh per capita)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LEA5</td><td style="background-color:#d9ecec;">Renewable energy consumption (% of total final energy consumption)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LEA6</td><td style="background-color:#d9ecec;">Rural access to electricity (% of rural population)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LEA7</td><td style="background-color:#d9ecec;">Urban access to electricity (% of urban population)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;" rowspan="8">Climate change and green growth</td><td style="background-color:#d9ecec;" rowspan="8">22.32</td><td style="background-color:#d9ecec;">LCH1</td><td style="background-color:#d9ecec;">CO<sub>2</sub> emissions (metric tons per capita)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LCH2</td><td style="background-color:#d9ecec;">Direct economic loss attributed to disasters relative to GDP (%)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LCH3</td><td style="background-color:#d9ecec;">Environmental goods exports as a share of total exports (%)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LCH4</td><td style="background-color:#d9ecec;">Forest land (% of land area)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LCH5</td><td style="background-color:#d9ecec;">PM<sub>2.5</sub>, air pollution, mean annual exposure (micrograms per cubic meter)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LCH6</td><td style="background-color:#d9ecec;">Production of electricity from solar, wind, tide, wave and other sources (kWh per capita)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LCH7</td><td style="background-color:#d9ecec;">Production of hydroelectricity (kWh per capita)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LCH8</td><td style="background-color:#d9ecec;">Total greenhouse gas emissions (metric tons of CO<sub>2</sub> equivalent per capita)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;" rowspan="4">Electricity generation</td><td style="background-color:#d9ecec;" rowspan="4">21.71</td><td style="background-color:#d9ecec;">LEG1</td><td style="background-color:#d9ecec;">Increase of off-grid renewable electricity generation</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LEG2</td><td style="background-color:#d9ecec;">Increase of on-grid renewable electricity generation.</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LEG3</td><td style="background-color:#d9ecec;">Share of renewable electricity generation in total generation (%)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">LEG4</td><td style="background-color:#d9ecec;">Total electricity generation (kWh per capita)</td></tr><tr style="background-color:#d9ecec;"><td style="background-color:#d9ecec;">Electricity regulatory framework</td><td style="background-color:#d9ecec;">28.01</td><td style="background-color:#d9ecec;">LPR1</td><td style="background-color:#d9ecec;">Electricity regulatory framework composite score</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;" rowspan="14"><strong>Food sovereignty</strong></td><td style="background-color:#f4d7c4;" rowspan="2">Agricultural value chain development</td><td style="background-color:#f4d7c4;" rowspan="14">20</td><td style="background-color:#f4d7c4;" rowspan="2">25.31</td><td style="background-color:#f4d7c4;">FVC1</td><td style="background-color:#f4d7c4;">Agriculture gross per capita production index (number)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;">FVC2</td><td style="background-color:#f4d7c4;">Agriculture, value added (% of GDP)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;" rowspan="5">End extreme poverty</td><td style="background-color:#f4d7c4;" rowspan="5">26.92</td><td style="background-color:#f4d7c4;">FEP1</td><td style="background-color:#f4d7c4;">Arable land (% of land area)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;">FEP2</td><td style="background-color:#f4d7c4;">Fertilizers by nutrient, use per area of cropland (kg/ha)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;">FEP3</td><td style="background-color:#f4d7c4;">Irrigated land (as % of land area)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;">FEP4</td><td style="background-color:#f4d7c4;">Permanent pastures (as % of land area)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;">FEP5</td><td style="background-color:#f4d7c4;">Water use efficiency (US$ per cubic meter)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;" rowspan="3">Eliminate hunger–food security</td><td style="background-color:#f4d7c4;" rowspan="3">20.01</td><td style="background-color:#f4d7c4;">FEH1</td><td style="background-color:#f4d7c4;">Daily calorie supply (kcal per capita)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;">FEH2</td><td style="background-color:#f4d7c4;">Prevalence of stunting, height for age (%)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;">FEH3</td><td style="background-color:#f4d7c4;">Prevalence of undernourishment (%)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;" rowspan="4">Net agricultural exports (product diversity)</td><td style="background-color:#f4d7c4;" rowspan="4">27.76</td><td style="background-color:#f4d7c4;">FNE1</td><td style="background-color:#f4d7c4;">Exports of food and live animals (% of total exports)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;">FNE2</td><td style="background-color:#f4d7c4;">Food aid in cereals (metric tons per capita)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;">FNE3</td><td style="background-color:#f4d7c4;">Imports of food and live animals (% of total imports)</td></tr><tr style="background-color:#f4d7c4;"><td style="background-color:#f4d7c4;">FNE4</td><td style="background-color:#f4d7c4;">Value of net food and live animal exports (% of GDP)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;" rowspan="19"><strong>Regional integration</strong></td><td style="background-color:#cfd6e8;" rowspan="3">Freedom of movement</td><td style="background-color:#cfd6e8;" rowspan="19">20</td><td style="background-color:#cfd6e8;" rowspan="3">25.70</td><td style="background-color:#cfd6e8;">IFR1</td><td style="background-color:#cfd6e8;">Air connectivity scores per 1,000 persons</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">IFR2</td><td style="background-color:#cfd6e8;">Air transport passengers carried per 1,000 persons</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">IFR3</td><td style="background-color:#cfd6e8;">Liberal access rate (visa on arrival and visa-free)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;" rowspan="3">Ratification of regional agreements</td><td style="background-color:#cfd6e8;" rowspan="3">27.54</td><td style="background-color:#cfd6e8;">IAG1</td><td style="background-color:#cfd6e8;">Intra-African exports (as % of total exports)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">IAG2</td><td style="background-color:#cfd6e8;">Level of country participation in intra-African trade flows</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">IAG3</td><td style="background-color:#cfd6e8;">Ratification of the African Continental Free Trade Area</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;" rowspan="3">Infrastructure (roads)</td><td style="background-color:#cfd6e8;" rowspan="3">25.01</td><td style="background-color:#cfd6e8;">INF1</td><td style="background-color:#cfd6e8;">Mortality caused by road traffic injury (per 100,000 population)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">INF2</td><td style="background-color:#cfd6e8;">Paved roads (% of total road)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">INF3</td><td style="background-color:#cfd6e8;">Total road network (km)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;" rowspan="10">Intra-African trade</td><td style="background-color:#cfd6e8;" rowspan="10">21.75</td><td style="background-color:#cfd6e8;">INT1</td><td style="background-color:#cfd6e8;">Air transport, freight (million ton-km)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">INT2</td><td style="background-color:#cfd6e8;">Exchange rate developments (per US$)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">INT3</td><td style="background-color:#cfd6e8;">Foreign direct investment inflows from all donors (US$, million)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">INT4</td><td style="background-color:#cfd6e8;">Gross capital formation, private sector (% of GDP)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">INT5</td><td style="background-color:#cfd6e8;">Net total official flows from all donors (NOF) (current US$)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">INT6</td><td style="background-color:#cfd6e8;">Time required to start a business (days)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">INT7</td><td style="background-color:#cfd6e8;">Time to export, border compliance (hours)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">INT8</td><td style="background-color:#cfd6e8;">Time to import, border compliance (hours)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">INT9</td><td style="background-color:#cfd6e8;">Total debt service: interest and amortization paid (% of exports of goods and services)</td></tr><tr style="background-color:#cfd6e8;"><td style="background-color:#cfd6e8;">INT10</td><td style="background-color:#cfd6e8;">Total trade outside Africa (% of total trade)</td></tr><tr style="background-color:#ddd3e3;"><td style="background-color:#ddd3e3;" rowspan="9"><strong>Industrialization</strong></td><td style="background-color:#ddd3e3;" rowspan="4">Infrastructure (industrial parks)</td><td style="background-color:#ddd3e3;" rowspan="9">20</td><td style="background-color:#ddd3e3;" rowspan="4">50</td><td style="background-color:#ddd3e3;">INP1</td><td style="background-color:#ddd3e3;">Africa Infrastructure Development Index</td></tr><tr style="background-color:#ddd3e3;"><td style="background-color:#ddd3e3;">INP2</td><td style="background-color:#ddd3e3;">Industry, value added (% of GDP)</td></tr><tr style="background-color:#ddd3e3;"><td style="background-color:#ddd3e3;">INP3</td><td style="background-color:#ddd3e3;">Manufacturing employment as a proportion of total employment (%)</td></tr><tr style="background-color:#ddd3e3;"><td style="background-color:#ddd3e3;">INP4</td><td style="background-color:#ddd3e3;">Manufacturing, value added (% of GDP)<sup>a</sup></td></tr><tr style="background-color:#ddd3e3;"><td style="background-color:#ddd3e3;" rowspan="5">Enabling business environment</td><td style="background-color:#ddd3e3;" rowspan="5">50</td><td style="background-color:#ddd3e3;">EBE1</td><td style="background-color:#ddd3e3;">CPIA Business Regulatory Environment</td></tr><tr style="background-color:#ddd3e3;"><td style="background-color:#ddd3e3;">EBE2</td><td style="background-color:#ddd3e3;">Foreign direct investment (% of gross capital formation)</td></tr><tr style="background-color:#ddd3e3;"><td style="background-color:#ddd3e3;">EBE3</td><td style="background-color:#ddd3e3;">Time required to enforce a contract (days)</td></tr><tr style="background-color:#ddd3e3;"><td style="background-color:#ddd3e3;">EBE4</td><td style="background-color:#ddd3e3;">Time required to register property (days)</td></tr><tr style="background-color:#ddd3e3;"><td style="background-color:#ddd3e3;">EBE5</td><td style="background-color:#ddd3e3;">Time required to start a business (days)</td></tr><tr style="background-color:#f5dfcf;"><td style="background-color:#f5dfcf;" rowspan="37"><strong>Socioeconomic inclusion</strong></td><td style="background-color:#f5dfcf;" rowspan="8">Youth and employment and training</td><td style="background-color:#f5dfcf;" rowspan="37">20</td><td style="background-color:#f5dfcf;" rowspan="8">21.31</td>